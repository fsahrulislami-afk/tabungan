<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High School Student Pocket Money Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Cherry+Bomb+One&display=swap" rel="stylesheet">
</head>
<body>
    <div id="cursor-light"></div>

    <div class="blobs">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="container">
        <header>
            <h1 class="title">✨ HS Student PMM ✨</h1>
            <p class="subtitle">High School Student Pocket Money Manager 🎀</p>
        </header>

        <main class="main-card">
            <section id="initial-setup" class="setup-box">
                <h3>💖 Saldo Awal Kamu</h3>
                <div class="input-wrapper">
                    <input type="number" id="input-awal" placeholder="Contoh: 50000">
                    <button onclick="mulaiAplikasi()" class="btn-main">Mulai Yuk! ✨</button>
                </div>
            </section>

            <section id="dashboard" class="hidden">
                <div class="balance-bubble" id="balance-container">
                    <small>Saldo Saat Ini ☁️</small>
                    <h2 id="display-saldo">Rp 0</h2>
                </div>

                <div class="status-pill" id="system-status">
                    🌸 Status: Aman Bestie
                </div>

                <div class="action-grid">
                    <div class="card-cute income">
                        <h4>Pemasukan 💸</h4>
                        <input type="number" id="input-pemasukan" placeholder="Berapa?">
                        <button onclick="tambahPemasukan()" class="btn-sm">Tambah +</button>
                    </div>
                    <div class="card-cute expense">
                        <h4>Pengeluaran 🛍️</h4>
                        <input type="number" id="input-pengeluaran" placeholder="Berapa?">
                        <button onclick="kurangPengeluaran()" class="btn-sm">Catat -</button>
                    </div>
                </div>

                <div id="warning-box" class="warning-cute hidden">
                    🚨 Aduh! Saldo kamu sudah tipis nih, jangan jajan dulu ya! 🚨
                </div>
                
                <button onclick="resetSystem()" class="btn-reset">Mulai Dari Awal 🫧</button>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
